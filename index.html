<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آدم عمر الشريف ❤️</title>
    <style>
        :root {
            --baby-blue: #A2D2FF;
            --royal-blue: #0077B6;
            --gold: #FFD700;
            --white: #ffffff;
        }

        body {
            background: linear-gradient(135deg, #fdfcfb 0%, #e2ebf0 100%);
            color: #444;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* غبار النجوم السحري */
        .particle { position: fixed; pointer-events: none; border-radius: 50%; background: var(--gold); z-index: 9999; animation: fadeParticle 1s forwards; }
        @keyframes fadeParticle { to { transform: scale(2); opacity: 0; } }

        /* شاشة الاستقبال */
        #welcome-screen {
            position: fixed; inset: 0; background: white; z-index: 2000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            text-align: center; transition: 1s;
        }
        .enter-btn {
            background: var(--baby-blue); color: white; padding: 25px 60px;
            border: none; border-radius: 60px; font-size: 26px; font-weight: bold;
            cursor: pointer; box-shadow: 0 15px 30px rgba(162, 210, 255, 0.5);
            transition: 0.4s ease; border: 3px solid var(--white);
        }

        /* الحاوية الرئيسية */
        .container { width: 92%; max-width: 580px; display: none; flex-direction: column; gap: 25px; padding: 60px 0; z-index: 10; }
        
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px; padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.06);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        .baby-name {
            color: var(--royal-blue); font-size: 38px; font-weight: 900;
            margin: 10px 0; animation: gentlePulse 3s infinite;
        }

        /* العداد مع هالة ضوئية */
        .timer-glow {
            background: linear-gradient(45deg, var(--baby-blue), var(--royal-blue));
            color: white; padding: 25px; border-radius: 35px; font-size: 26px;
            font-weight: bold; direction: ltr; 
            box-shadow: 0 0 20px rgba(162, 210, 255, 0.6);
            animation: glowPulse 4s infinite alternate;
        }

        /* رسالة الترحيب (Typewriter) */
        .message-box {
            line-height: 2.2; font-size: 21px; color: #2D3436;
            text-align: right; min-height: 180px;
            padding: 20px; border-radius: 20px;
            background: rgba(205, 235, 255, 0.2);
        }

        /* زر الواتساب */
        .btn-wa {
            background: #25D366; color: white; padding: 25px;
            border-radius: 35px; text-decoration: none; font-weight: bold;
            font-size: 24px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-wa:hover { transform: translateY(-8px) scale(1.02); }

        /* بالونات */
        .balloon { position: fixed; font-size: 35px; z-index: -1; animation: floatBalloon 10s linear infinite; opacity: 0.7; }

        @keyframes floatBalloon { from { bottom: -100px; transform: translateX(0); } to { bottom: 110vh; transform: translateX(50px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes gentlePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes glowPulse { from { box-shadow: 0 0 10px rgba(162, 210, 255, 0.4); } to { box-shadow: 0 0 30px rgba(162, 210, 255, 0.8); } }

        #player { position: absolute; top: -1000px; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div style="font-size: 80px; margin-bottom: 25px;">👶🏻✨</div>
        <button class="enter-btn" onclick="startApp()">استقبال الأمير آدم 💙</button>
        <p style="margin-top: 20px; color: #888; font-weight: bold;">أهلاً بك في عالم آدم الصغير</p>
    </div>

    <div id="player"></div>

    <div class="container" id="main-container">
        <div class="card">
            <h2 style="color: var(--gold); margin: 0; font-size: 22px;">الحمد لله على تمام النعمة</h2>
            <div class="baby-name">آدم عمر الشريف</div>
            <div style="font-size: 45px;">👣🍼</div>
        </div>

        <div class="card">
            <div style="font-size: 19px; color: #666; font-weight: bold; margin-bottom: 15px;">نور دنيتنا منذ:</div>
            <div class="timer-glow" id="timer">00d : 00h : 00m : 00s</div>
        </div>

        <div class="card">
            <div id="welcome-msg" class="message-box"></div>
        </div>

        <a href="https://wa.me/201031319239?text=بفضل%20الله%20رزقنا%20اليوم%20بأجمل%20نعمة%20🤍👶🏻%20آدم%20عمر%20الشريف%20نور%20حياتنا%20وفرّح%20قلوبنا..%20ألف%20مليون%20مبروك%20يتربى%20في%20عزكم%20يا%20بطل%20💙" class="btn-wa">
            شاركنا فرحتنا 💬
        </a>
    </div>

    <script>
        // إعداد اليوتيوب (الأغنية اللي بعتها)
        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'QUjbUOfCr7s', // الأغنية المطلوبة
                events: { 'onReady': () => {} }
            });
        }

        function startApp() {
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('main-container').style.display = 'flex';
                player.playVideo();
                setInterval(updateTimer, 1000);
                startBalloons();
                typeWriter();
            }, 800);
        }

        // تأثير غبار النجوم عند الماوس
        document.addEventListener('mousemove', (e) => {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = e.pageX + 'px';
            p.style.top = e.pageY + 'px';
            const size = Math.random() * 5 + 2 + 'px';
            p.style.width = size; p.style.height = size;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        });

        // العداد من 4 صباحاً 7 مايو
        function updateTimer() {
            const birth = new Date("2026-05-07T04:00:00");
            const diff = new Date() - birth;
            const d = Math.floor(diff / 86400000), h = Math.floor(diff%86400000/3600000), m = Math.floor(diff%3600000/60000), s = Math.floor(diff%60000/1000);
            document.getElementById('timer').innerText = `${d}d : ${h}h : ${m}m : ${s}s`;
        }

        // الرسالة حرف حرف
        const text = "بفضل الله رزقنا اليوم بأجمل نعمة 🤍👶🏻\n“آدم عمر الشريف” نَوَّر حياتنا وفرّح قلوبنا ✨\nاللهم أنبته نباتًا حسنًا، واجعله من عبادك الصالحين، واحفظه بعينك التي لا تنام 🤲🏻💙\nبما انك وصلت لهنا اعرف انك شخص غالي عندي وحبيت اشاركك فرحتي.. وشكرًا ليك لو شاركنا فرحتنا 🌸🎉";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                const char = text.charAt(i);
                document.getElementById("welcome-msg").innerHTML += (char === "\n" ? "<br>" : char);
                i++;
                setTimeout(typeWriter, 50);
            }
        }

        // بالونات آدم
        function startBalloons() {
            const icons = ['🎈', '🧸', '🧸', '🎈', '💙', '🍼'];
            setInterval(() => {
                const b = document.createElement('div');
                b.className = 'balloon';
                b.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                b.style.left = Math.random() * 100 + 'vw';
                document.body.appendChild(b);
                setTimeout(() => b.remove(), 10000);
            }, 1000);
        }
    </script>
</body>
</html>
